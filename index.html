            color: #fff;
            font: bold 13px -apple-system, sans-serif;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #cam-bar button.active {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);

            position: fixed; bottom: 8px; right: 8px; z-index: 50;

            font: 700 13px -apple-system, 'Helvetica Neue', sans-serif;

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';

// ── Renderer ────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x050508);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ── Scene ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a10, 0.012);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(-3.80, 3.48, -11.09);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(-1.23, 3.62, 0.52);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 100;
controls.enabled = false;
controls.update();

// ── Mouse parallax (subtle camera drift while keeping lookAt constant) ──
const mouseNorm = { x: 0, y: 0 };
const mouseLerped = { x: 0, y: 0 };
const PARALLAX_STRENGTH = 0.8;
const PARALLAX_LERP = 0.04;
let baseCamPos = camera.position.clone();

window.addEventListener('mousemove', (e) => {
    mouseNorm.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseNorm.y = (e.clientY / window.innerHeight) * 2 - 1;
});

function updateBaseCamPos() {
    baseCamPos.copy(camera.position);
}

// ── Loaders ─────────────────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// ── Light Fixtures Shader ───────────────────────────────────────────
const lightFixtureUniforms = {
    color: { value: new THREE.Color(0xffffff) },
    intensity: { value: 1.5 },
    time: { value: 0 },
};
const lightFixtureMat = new THREE.ShaderMaterial({
    uniforms: lightFixtureUniforms,
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform vec3 color;
        uniform float intensity;
        uniform float time;
        varying vec2 vUv;
        void main() {
            float pulse = 0.95 + 0.05 * sin(time * 2.0);
            gl_FragColor = vec4(color * intensity * pulse, 1.0);
        }
    `,
});

// ── Screen Materials ────────────────────────────────────────────────
const screenMaterialsMain = [];   // jumbotron — sharp
const screenMaterialsSecondary = []; // banners + TV screens — blurred
let allScreenMaterials = [];      // combined for legacy switchToVideo etc
let defaultScreenTexture = null;
let blurredTexture = null;
let videoTexture = null;
let videoElement = null;
let videoMode = false;

// Blurred canvas for secondary screens
const blurCanvas = document.createElement('canvas');
blurCanvas.width = 512;
blurCanvas.height = 512;
const blurCtx = blurCanvas.getContext('2d');
blurCtx.filter = 'blur(12px)';
const blurCanvasTex = new THREE.CanvasTexture(blurCanvas);
blurCanvasTex.colorSpace = THREE.SRGBColorSpace;
blurCanvasTex.flipY = false;

function setScreenTexture(texture) {
    // Main screens — sharp
    screenMaterialsMain.forEach(mat => {
        mat.emissiveMap = texture;
        mat.map = texture;
        mat.needsUpdate = true;
    });
    // Secondary screens — blurred version
    blurredTexture = texture;
    screenMaterialsSecondary.forEach(mat => {
        mat.emissiveMap = blurCanvasTex;
        mat.map = blurCanvasTex;
        mat.needsUpdate = true;
    });
}

// ── Load Arena (v2 — screens UV'd in full scene as "CenterScreens" material) ──
gltfLoader.load('models/MSG_Basketball_converted.glb', (gltf) => {
    const model = gltf.scene;
    model.scale.setScalar(0.3);
    scene.add(model);

    model.traverse((child) => {
        if (!child.isMesh) return;
        const matName = child.material?.name || '';

        const name = child.name || '';

        // Hide Material #82 (old screen face with bad UVs, shows yellow rim)
        if (matName === 'Material #82') {
            child.visible = false;
        }

        // CenterScreens — the unified UV-mapped screen material (sharp)
        if (matName === 'CenterScreens') {
            const sMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffffff, emissiveIntensity: 1.5 });
            child.material = sMat;
            screenMaterialsMain.push(sMat);
        }

        // Banners — blurred version (skip Black and structural materials)
        if (/^Banners/i.test(name) && matName !== 'Black' && matName !== 'Navy Blue' && !/^Banner \d/i.test(matName) && !/^Logo/i.test(matName)) {
            const sMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffffff, emissiveIntensity: 1.5 });
            child.material = sMat;
            screenMaterialsSecondary.push(sMat);
        }

        // TV Screens — blurred version (skip Black and Chrome frames)
        if (/^Tv_Screens|^TV_Screens/i.test(name) && matName !== 'Black' && matName !== 'Metal 1 (Chrome)') {
            const sMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffffff, emissiveIntensity: 1.5 });
            child.material = sMat;
            screenMaterialsSecondary.push(sMat);
        }

        // Halogen Lights — emissive shader (only Material #56 and #52)
        if (/^Halogen/i.test(child.name || '')) {
            if (/^Material #(56|52)$/i.test(matName)) {
                child.material = lightFixtureMat;
            }
        }
        // Lights Roof — emissive shader
        if (child.name === 'Lights_Roof_2') {
            child.material = lightFixtureMat;
        }
    });
    allScreenMaterials = [...screenMaterialsMain, ...screenMaterialsSecondary];
    console.log('Screens — main:', screenMaterialsMain.length, 'secondary:', screenMaterialsSecondary.length);

    // Preload all screen textures
    const texLoader = new THREE.TextureLoader();
    const screenImages = ['models/storm-version-1.jpeg', 'models/storm-version4.png', 'models/storm-version5.png'];
    screenImages.forEach((src, i) => {
        texLoader.load(src, (tex) => {
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.flipY = false;
            presetTexCache[src] = tex;
            if (i === 0) { defaultScreenTexture = tex; setScreenTexture(tex); }
        });
    });
});

// ── Arena Lighting ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const arenaSpot1 = new THREE.SpotLight(0xffffff, 2.0, 120, Math.PI / 3, 0.5);
arenaSpot1.position.set(0, 40, 0);
scene.add(arenaSpot1);
const arenaSpot2 = new THREE.SpotLight(0xffffff, 1.0, 80, Math.PI / 3, 0.6);
arenaSpot2.position.set(20, 30, 20);
scene.add(arenaSpot2);
const arenaSpot3 = new THREE.SpotLight(0xffffff, 1.0, 80, Math.PI / 3, 0.6);
arenaSpot3.position.set(-20, 30, -20);
scene.add(arenaSpot3);

// ── Laser Beams ────────────────────────────────────────────────────
const MAX_EMITTERS = 25;
const MAX_BEAMS_PER_GROUP = MAX_EMITTERS * 3; // main + up to 2 extras per emitter

function createLaserGroup() {
    const group = new THREE.Group();
    scene.add(group);
    const mat = new THREE.MeshBasicMaterial({
        color: 0xff6600,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false,
        toneMapped: false,
    });
    const beams = [];
    for (let i = 0; i < MAX_BEAMS_PER_GROUP; i++) {
        const geo = new THREE.BufferGeometry();
        // Two crossed triangles (6 verts) to prevent disappearing at edge-on angles
        const positions = new Float32Array(6 * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setIndex([0, 1, 2, 3, 4, 5]);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.frustumCulled = false;
        mesh.visible = false;
        group.add(mesh);
        beams.push(mesh);
    }
    return { group, mat, beams };
}

function updateLaserGroup(lg, p, elapsed) {
    const pulseCycle = p.pulseOn + p.pulseOff;
    const pulseVisible = pulseCycle <= 0 || (elapsed % pulseCycle) < p.pulseOn;
    if (p.enabled && p.count > 0 && pulseVisible) {
        const lColor = new THREE.Color(p.color);
        lColor.multiplyScalar(p.intensity);
        lg.mat.color.copy(lColor);
        lg.mat.opacity = p.opacity;

        const t = (elapsed % p.timer) / p.timer;
        const sweepAngle = t * Math.PI * 2;
        const animX = Math.sin(sweepAngle);
        const animY = Math.cos(sweepAngle);

        const beamsPerEmitter = 1 + p.extra;
        const halfW = p.width / 2;
        const extraOffsets = [0, p.extra1Offset, p.extra2Offset];
        let meshIdx = 0;

        for (let i = 0; i < MAX_EMITTERS; i++) {
            if (i >= p.count) {
                for (let e = 0; e < 3; e++) {
                    if (meshIdx < MAX_BEAMS_PER_GROUP) lg.beams[meshIdx++].visible = false;
                }
                continue;
            }

            const angle = (i / p.count) * Math.PI * 2 + p.rotation * (Math.PI / 180);
            const emitX = Math.cos(angle) * p.radius;
            const emitZ = Math.sin(angle) * p.radius;
            const emitY = p.height;

            const tanX = -Math.sin(angle);
            const tanZ = Math.cos(angle);

            for (let e = 0; e < 3; e++) {
                const mesh = lg.beams[meshIdx++];
                if (e >= beamsPerEmitter) { mesh.visible = false; continue; }
                mesh.visible = true;

                const extraOff = extraOffsets[e];
                const fullX = tanX * (p.baseX + extraOff + p.targetX * animX);
                const fullY = 7.0 + p.baseY + p.targetY * animY;
                const fullZ = tanZ * (p.baseX + extraOff + p.targetX * animX);

                const bRad = p.beamRotation * (Math.PI / 180);
                const cosB = Math.cos(bRad), sinB = Math.sin(bRad);
                const dx = fullX - emitX, dz = fullZ - emitZ;
                const rFullX = emitX + dx * cosB - dz * sinB;
                const rFullZ = emitZ + dx * sinB + dz * cosB;

                const len = p.length;
                const targetX = emitX + (rFullX - emitX) * len;
                const targetY = emitY + (fullY - emitY) * len;
                const targetZ = emitZ + (rFullZ - emitZ) * len;

                // Horizontal cross-plane (width in XZ)
                const bx = targetX - emitX, by = targetY - emitY, bz = targetZ - emitZ;
                const hLen = Math.sqrt(bz * bz + bx * bx) || 0.001;
                const twx = (bz / hLen) * halfW;
                const twz = (-bx / hLen) * halfW;

                // Vertical cross-plane (width in Y)
                const beamLen = Math.sqrt(bx * bx + by * by + bz * bz) || 0.001;
                const upX = (bx / beamLen), upY = (by / beamLen), upZ = (bz / beamLen);
                // perpendicular in the beam-vertical plane
                const vwx = -upY * (bx / hLen) * halfW;
                const vwy = hLen / beamLen * halfW;
                const vwz = -upY * (bz / hLen) * halfW;

                const pos = mesh.geometry.attributes.position.array;
                // Triangle 1: horizontal cross
                pos[0] = emitX;            pos[1] = emitY;    pos[2] = emitZ;
                pos[3] = targetX - twx;    pos[4] = targetY;  pos[5] = targetZ - twz;
                pos[6] = targetX + twx;    pos[7] = targetY;  pos[8] = targetZ + twz;
                // Triangle 2: vertical cross
                pos[9]  = emitX;           pos[10] = emitY;   pos[11] = emitZ;
                pos[12] = targetX - vwx;   pos[13] = targetY - vwy; pos[14] = targetZ - vwz;
                pos[15] = targetX + vwx;   pos[16] = targetY + vwy; pos[17] = targetZ + vwz;
                mesh.geometry.attributes.position.needsUpdate = true;
            }
        }
        while (meshIdx < MAX_BEAMS_PER_GROUP) lg.beams[meshIdx++].visible = false;
    } else {
        for (let i = 0; i < MAX_BEAMS_PER_GROUP; i++) lg.beams[i].visible = false;
    }
}

const laserGroup1 = createLaserGroup();
const laserGroup2 = createLaserGroup();

// ── Post-Processing ─────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.20, 0.60, 0.15);
composer.addPass(bloomPass);

const cinemaShader = {
    uniforms: {
        tDiffuse: { value: null },
        time: { value: 0 },
        grainAmount: { value: 0 },
        chromaticAberration: { value: 0 },
        saturation: { value: 1.0 },
        contrast: { value: 1.0 },
        brightness: { value: 0 },
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float time, grainAmount;
        uniform float chromaticAberration, saturation, contrast, brightness;
        varying vec2 vUv;
        float rand(vec2 co) { return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453); }
        void main() {
            vec2 uv = vUv;
            vec2 dir = uv - 0.5;
            float dist = length(dir);
            vec2 offset = dir * chromaticAberration * dist;
            float r = texture2D(tDiffuse, uv + offset).r;
            float g = texture2D(tDiffuse, uv).g;
            float b = texture2D(tDiffuse, uv - offset).b;
            vec3 color = vec3(r, g, b);
            color = (color + brightness) * contrast;
            float luma = dot(color, vec3(0.2126, 0.7152, 0.0722));
            color = mix(vec3(luma), color, saturation);
            float grain = rand(uv * time) * grainAmount;
            color += grain - grainAmount * 0.5;
            gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
        }
    `,
};
const cinemaPass = new ShaderPass(cinemaShader);
composer.addPass(cinemaPass);
composer.addPass(new OutputPass());

// ── Resize ──────────────────────────────────────────────────────────
function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio);
    composer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Tweakpane ───────────────────────────────────────────────────────
const params = {
    ambientIntensity: 3, ambientColor: '#333333',
    spotIntensity: 0, spotColor: '#ffffff',
    bgColor: '#ffffff', fogDensity: 0.009, fogColor: '#0a0a10',
    exposure: 0.55,
    bloom: 0.5, bloomRadius: 0.7, bloomThreshold: 0.8,
    grain: 0.03, chromatic: 0,
    saturation: 1, contrast: 1, brightness: 0,
    lightFixtureIntensity: 2, lightFixtureColor: '#efefef',
    screenEmissive: 1.5,
    // Laser Group 1
    l1_enabled: false, l1_count: 4, l1_color: '#ff6600',
    l1_intensity: 5, l1_opacity: 0.6, l1_width: 0.05, l1_timer: 10,
    l1_baseX: -0.3, l1_baseY: -1.4, l1_targetX: 0, l1_targetY: 0,
    l1_length: 1, l1_pulseOn: 1, l1_pulseOff: 0,
    l1_extra: 0, l1_extra1Offset: 0.5, l1_extra2Offset: 1,
    l1_rotation: 0, l1_beamRotation: 0, l1_radius: 14, l1_height: 3.2,
    // Laser Group 2
    l2_enabled: false, l2_count: 4, l2_color: '#0066ff',
    l2_intensity: 3, l2_opacity: 0.6, l2_width: 0.15, l2_timer: 10,
    l2_baseX: 0, l2_baseY: 0, l2_targetX: 0, l2_targetY: 0,
    l2_length: 1, l2_pulseOn: 1, l2_pulseOff: 0,
    l2_extra: 0, l2_extra1Offset: 0.5, l2_extra2Offset: 1,
    l2_rotation: 0, l2_beamRotation: 0, l2_radius: 14, l2_height: 7.4,
    // Camera
    camPosX: -3.80, camPosY: 3.48, camPosZ: -11.09,
    camRotX: 146.46, camRotY: 78.24, camRotZ: -147.02,
    camZoom: 45,
    targetX: -1.23, targetY: 3.62, targetZ: 0.52,
};

// Load saved settings
try {
    const saved = localStorage.getItem('msg-jumbotron-concept');
    if (saved) {
        const parsed = JSON.parse(saved);
        Object.assign(params, parsed);
        applyCameraFromParams();
    }
} catch (e) { console.warn('Could not load concept:', e); }

function applyCameraFromParams() {
    if (params.camPosX != null) camera.position.set(params.camPosX, params.camPosY, params.camPosZ);
    if (params.camZoom != null) { camera.fov = params.camZoom; camera.updateProjectionMatrix(); }
    if (params.targetX != null) controls.target.set(params.targetX, params.targetY, params.targetZ);
    controls.update();
    updateBaseCamPos();
}

const pane = new Pane({ title: 'MSG Jumbotron', expanded: false });
pane.element.style.display = 'none';
window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'g') {
        e.preventDefault();
        const el = pane.element;
        const opening = el.style.display === 'none';
        el.style.display = opening ? '' : 'none';
        controls.enabled = opening;
        if (!opening) updateBaseCamPos();
    }
});

// Presets
const presets = {
    lit: {
        ambientIntensity: 3, ambientColor: '#333333',
        spotIntensity: 0, spotColor: '#ffffff',
        bgColor: '#ffffff', fogDensity: 0.009, fogColor: '#0a0a10',
        exposure: 0.55,
        bloom: 0.5, bloomRadius: 0.7, bloomThreshold: 0.8,
        grain: 0.03, chromatic: 0,
        saturation: 1, contrast: 1, brightness: 0,
        lightFixtureIntensity: 2, lightFixtureColor: '#efefef',
        screenEmissive: 1.5,
        l1_enabled: false, l1_count: 4, l1_color: '#ff6600', l1_intensity: 5, l1_opacity: 0.6,
        l1_width: 0.05, l1_timer: 10, l1_baseX: -0.3, l1_baseY: -1.4, l1_targetX: 0, l1_targetY: 0,
        l1_length: 1, l1_pulseOn: 1, l1_pulseOff: 0,
        l1_extra: 0, l1_extra1Offset: 0.5, l1_extra2Offset: 1,
        l1_rotation: 0, l1_beamRotation: 0, l1_radius: 14, l1_height: 3.2,
        l2_enabled: false, l2_count: 4, l2_color: '#0066ff', l2_intensity: 3, l2_opacity: 0.6,
        l2_width: 0.15, l2_timer: 10, l2_baseX: 0, l2_baseY: 0, l2_targetX: 0, l2_targetY: 0,
        l2_length: 1, l2_pulseOn: 1, l2_pulseOff: 0,
        l2_extra: 0, l2_extra1Offset: 0.5, l2_extra2Offset: 1,
        l2_rotation: 0, l2_beamRotation: 0, l2_radius: 14, l2_height: 7.4,
        camPosX: -3.80, camPosY: 3.48, camPosZ: -11.09,
        camZoom: 45, targetX: -1.23, targetY: 3.62, targetZ: 0.52,
        screenImage: 'models/storm-version-1.jpeg',
    },
    dark: {
        ambientIntensity: 3, ambientColor: '#333333',
        spotIntensity: 0, spotColor: '#ffffff',
        bgColor: '#ffffff', fogDensity: 0.009, fogColor: '#0a0a10',

const presetTexCache = {};
function loadPresetTexture(src, cb) {
    if (presetTexCache[src]) { cb(presetTexCache[src]); return; }
    new THREE.TextureLoader().load(src, (tex) => {
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.flipY = false;
        presetTexCache[src] = tex;
        cb(tex);
    });
}

function applyPreset(name) {
    const p = presets[name];
    Object.assign(params, p);
    applyCameraFromParams();
    pane.refresh();
    document.querySelectorAll('#preset-btns button').forEach(b => {
        b.classList.toggle('active', b.dataset.preset === name);
    });
    if (p.screenImage) {
        loadPresetTexture(p.screenImage, (tex) => setScreenTexture(tex));
    }
}

// ── Animation Loop ──────────────────────────────────────────────────
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    elapsed += dt;

    // Sync camera → params
    params.camPosX = +camera.position.x.toFixed(2);
    params.camPosY = +camera.position.y.toFixed(2);
    params.camPosZ = +camera.position.z.toFixed(2);
    params.camRotX = +(THREE.MathUtils.radToDeg(camera.rotation.x)).toFixed(2);
    params.camRotY = +(THREE.MathUtils.radToDeg(camera.rotation.y)).toFixed(2);
    params.camRotZ = +(THREE.MathUtils.radToDeg(camera.rotation.z)).toFixed(2);
    params.camZoom = +camera.fov.toFixed(0);
    params.targetX = +controls.target.x.toFixed(2);
    params.targetY = +controls.target.y.toFixed(2);
    params.targetZ = +controls.target.z.toFixed(2);
    camFolder.refresh();

    // Scene
    ambientLight.intensity = params.ambientIntensity;
    ambientLight.color.set(params.ambientColor);
    arenaSpot1.intensity = params.spotIntensity;
    arenaSpot2.intensity = params.spotIntensity * 0.5;
    arenaSpot3.intensity = params.spotIntensity * 0.5;
    arenaSpot1.color.set(params.spotColor);
    arenaSpot2.color.set(params.spotColor);
    arenaSpot3.color.set(params.spotColor);
    renderer.setClearColor(params.bgColor);
    scene.fog.density = params.fogDensity;
    scene.fog.color.set(params.fogColor);
    renderer.toneMappingExposure = params.exposure;

    // Screen emissive
    allScreenMaterials.forEach(mat => { mat.emissiveIntensity = params.screenEmissive; });

    // Post FX
    bloomPass.strength = params.bloom;
    bloomPass.radius = params.bloomRadius;
    bloomPass.threshold = params.bloomThreshold;
    cinemaPass.uniforms.grainAmount.value = params.grain;
    cinemaPass.uniforms.chromaticAberration.value = params.chromatic;
    cinemaPass.uniforms.saturation.value = params.saturation;
    cinemaPass.uniforms.contrast.value = params.contrast;
    cinemaPass.uniforms.brightness.value = params.brightness;
    cinemaPass.uniforms.time.value = elapsed * 100;

    // Light fixtures
    lightFixtureUniforms.time.value = elapsed;
    lightFixtureUniforms.intensity.value = params.lightFixtureIntensity;
    lightFixtureUniforms.color.value.set(params.lightFixtureColor);

    // Lasers
    function getLaserParams(prefix) {
        const k = (name) => params[`${prefix}_${name}`];
        return {
            enabled: k('enabled'), count: k('count'), color: k('color'),
            intensity: k('intensity'), opacity: k('opacity'), width: k('width'),
            timer: k('timer'), baseX: k('baseX'), baseY: k('baseY'),
            targetX: k('targetX'), targetY: k('targetY'), length: k('length'),
            pulseOn: k('pulseOn'), pulseOff: k('pulseOff'),
            extra: k('extra'), extra1Offset: k('extra1Offset'), extra2Offset: k('extra2Offset'),
            rotation: k('rotation'), beamRotation: k('beamRotation'),
            radius: k('radius'), height: k('height'),
        };
    }
    updateLaserGroup(laserGroup1, getLaserParams('l1'), elapsed);
    updateLaserGroup(laserGroup2, getLaserParams('l2'), elapsed);

    // Update blurred texture for secondary screens
    if (blurredTexture && blurredTexture.image) {
        const src = blurredTexture.image;
        if (src.videoWidth || src.width) {
            blurCtx.drawImage(src, 0, 0, blurCanvas.width, blurCanvas.height);
            blurCanvasTex.needsUpdate = true;
        }
    }

    // Mouse parallax when controls are locked
    if (!controls.enabled) {
        mouseLerped.x += (mouseNorm.x - mouseLerped.x) * PARALLAX_LERP;
        mouseLerped.y += (mouseNorm.y - mouseLerped.y) * PARALLAX_LERP;
        const right = new THREE.Vector3();
        const up = new THREE.Vector3(0, 1, 0);
        camera.getWorldDirection(right);
        right.cross(up).normalize();
        camera.position.copy(baseCamPos);
        camera.position.addScaledVector(right, mouseLerped.x * PARALLAX_STRENGTH);
        camera.position.y += -mouseLerped.y * PARALLAX_STRENGTH * 0.5;
        camera.lookAt(controls.target);
    }

    controls.update();
    renderer.setRenderTarget(null);
    composer.render();
}

    { name: 'Camera005 — Low Left',   pos: [-30.290, 3.304, 13.108], rot: [0.150, -0.510, 0.091, 0.842] },
    { name: 'Camera001 — High Right', pos: [43.361, 12.061, -26.636], rot: [0.0, 0.008, -0.016, 0.426] },
];

const ARENA_SCALE = 0.3;
let savedFreePos = null;
let savedFreeTarget = null;

function switchToCamera(index) {
    const cam = sceneCameras[index];
    if (!cam) return;
    if (index === 0) {
        // Restore free camera
        if (savedFreePos) {
            camera.position.copy(savedFreePos);
            controls.target.copy(savedFreeTarget);
        }
        controls.enabled = true;
        return;
    }
    // Save free camera state
    if (controls.enabled) {
        savedFreePos = camera.position.clone();
        savedFreeTarget = controls.target.clone();
    }
    // Apply scene camera (scaled), always look at jumbotron center
    const p = cam.pos;
    camera.position.set(p[0] * ARENA_SCALE, p[1] * ARENA_SCALE, p[2] * ARENA_SCALE);
    controls.target.set(0, 7, 0); // jumbotron center
    controls.enabled = true;
    controls.update();
}

// ── Video/Image Switching ───────────────────────────────────────────
function switchToVideo(file) {
    if (videoElement) { videoElement.pause(); videoElement.src = ''; videoElement.remove(); }
    if (videoTexture) videoTexture.dispose();
    videoElement = document.createElement('video');
    videoElement.src = URL.createObjectURL(file);
    videoElement.loop = true; videoElement.muted = true; videoElement.playsInline = true;
    videoElement.play();
    videoTexture = new THREE.VideoTexture(videoElement);
    videoTexture.minFilter = THREE.LinearFilter; videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.colorSpace = THREE.SRGBColorSpace; videoTexture.flipY = false;
    setScreenTexture(videoTexture); videoMode = true;
}

function switchToImage(file) {
    if (videoElement) { videoElement.pause(); videoElement.src = ''; videoElement.remove(); videoElement = null; }
    if (videoTexture) videoTexture.dispose();
    const img = new Image();
    img.onload = () => {
        const tex = new THREE.Texture(img);
        tex.needsUpdate = true; tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
        tex.colorSpace = THREE.SRGBColorSpace; tex.flipY = false;
        videoTexture = tex; setScreenTexture(tex); videoMode = true;
    };
    img.src = URL.createObjectURL(file);
}

let dragCounter = 0;
document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.style.display = 'flex'; });
document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.style.display = 'none'; } });
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
    e.preventDefault(); dragCounter = 0; dropOverlay.style.display = 'none';
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (file.type.startsWith('video/')) switchToVideo(file);
    else if (file.type.startsWith('image/')) switchToImage(file);
});
