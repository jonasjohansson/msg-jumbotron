<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSG Jumbotron</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';

// ── Renderer ────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x050508);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

// ── Scene ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a10, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 7, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 100;
controls.update();

// ── Loaders ─────────────────────────────────────────────────────────
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// ── Light Fixtures Shader ───────────────────────────────────────────
const lightFixtureUniforms = {
    color: { value: new THREE.Color(0xffffff) },
    intensity: { value: 1.5 },
    time: { value: 0 },
};
const lightFixtureMat = new THREE.ShaderMaterial({
    uniforms: lightFixtureUniforms,
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform vec3 color;
        uniform float intensity;
        uniform float time;
        varying vec2 vUv;
        void main() {
            float pulse = 0.95 + 0.05 * sin(time * 2.0);
            gl_FragColor = vec4(color * intensity * pulse, 1.0);
        }
    `,
});

// ── Screen Materials ────────────────────────────────────────────────
const allScreenMaterials = [];
let defaultScreenTexture = null;
let videoTexture = null;
let videoElement = null;
let videoMode = false;

function setScreenTexture(texture) {
    allScreenMaterials.forEach(mat => {
        mat.map = texture;
        mat.color.set(0xffffff);
        mat.needsUpdate = true;
    });
}

// ── Load Arena (remove Center Screens — replaced by screens.glb) ───
gltfLoader.load('models/MSG_Basketball_converted.glb', (gltf) => {
    const model = gltf.scene;
    model.scale.setScalar(0.3);

    const toRemove = [];
    model.traverse((child) => {
        if (!child.isMesh) return;
        const name = child.name || '';
        if (/Center_Screens/i.test(name)) toRemove.push(child);
        if (/^Halogen_Lights|^Speakers/i.test(name)) child.material = lightFixtureMat;
    });
    toRemove.forEach(m => { m.removeFromParent(); m.geometry.dispose(); });

    scene.add(model);
});

// ── Load UV-Mapped Screens ──────────────────────────────────────────
gltfLoader.load('models/screens.glb', (gltf) => {
    const screens = gltf.scene;
    screens.scale.setScalar(0.3);
    scene.add(screens);

    const backMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
    screens.traverse((child) => {
        if (!child.isMesh) return;
        // Front: screen texture
        const sMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        child.material = sMat;
        allScreenMaterials.push(sMat);
        // Back: solid black
        const backMesh = child.clone();
        backMesh.material = backMat;
        child.parent.add(backMesh);
    });

    // Load default test video
    const defaultVideo = document.createElement('video');
    defaultVideo.src = 'models/screenUV_Layout_Test01.mp4';
    defaultVideo.loop = true;
    defaultVideo.muted = true;
    defaultVideo.playsInline = true;
    defaultVideo.play().catch(() => {
        document.addEventListener('click', () => defaultVideo.play(), { once: true });
    });
    const defaultVidTex = new THREE.VideoTexture(defaultVideo);
    defaultVidTex.minFilter = THREE.LinearFilter;
    defaultVidTex.magFilter = THREE.LinearFilter;
    defaultVidTex.colorSpace = THREE.SRGBColorSpace;
    defaultVidTex.flipY = false;
    defaultScreenTexture = defaultVidTex;
    setScreenTexture(defaultVidTex);
    videoMode = true;
});

// ── Arena Lighting ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const arenaSpot1 = new THREE.SpotLight(0xffffff, 2.0, 120, Math.PI / 3, 0.5);
arenaSpot1.position.set(0, 40, 0);
scene.add(arenaSpot1);
const arenaSpot2 = new THREE.SpotLight(0xffffff, 1.0, 80, Math.PI / 3, 0.6);
arenaSpot2.position.set(20, 30, 20);
scene.add(arenaSpot2);
const arenaSpot3 = new THREE.SpotLight(0xffffff, 1.0, 80, Math.PI / 3, 0.6);
arenaSpot3.position.set(-20, 30, -20);
scene.add(arenaSpot3);

// ── Post-Processing ─────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.5, 0.8);
composer.addPass(bloomPass);

const cinemaShader = {
    uniforms: {
        tDiffuse: { value: null },
        time: { value: 0 },
        grainAmount: { value: 0 },
        chromaticAberration: { value: 0 },
        saturation: { value: 1.0 },
        contrast: { value: 1.0 },
        brightness: { value: 0 },
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float time, grainAmount;
        uniform float chromaticAberration, saturation, contrast, brightness;
        varying vec2 vUv;
        float rand(vec2 co) { return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453); }
        void main() {
            vec2 uv = vUv;
            vec2 dir = uv - 0.5;
            float dist = length(dir);
            vec2 offset = dir * chromaticAberration * dist;
            float r = texture2D(tDiffuse, uv + offset).r;
            float g = texture2D(tDiffuse, uv).g;
            float b = texture2D(tDiffuse, uv - offset).b;
            vec3 color = vec3(r, g, b);
            color = (color + brightness) * contrast;
            float luma = dot(color, vec3(0.2126, 0.7152, 0.0722));
            color = mix(vec3(luma), color, saturation);
            float grain = rand(uv * time) * grainAmount;
            color += grain - grainAmount * 0.5;
            gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
        }
    `,
};
const cinemaPass = new ShaderPass(cinemaShader);
composer.addPass(cinemaPass);
composer.addPass(new OutputPass());

// ── Resize ──────────────────────────────────────────────────────────
function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio);
    composer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Tweakpane ───────────────────────────────────────────────────────
const params = {
    ambientIntensity: 0.8, ambientColor: '#ffffff',
    spotIntensity: 2.0, spotColor: '#ffffff',
    bgColor: '#050508', fogDensity: 0.012, fogColor: '#0a0a10',
    exposure: 0.8,
    bloom: 0.4, bloomRadius: 0.5, bloomThreshold: 0.8,
    grain: 0, chromatic: 0,
    saturation: 1.0, contrast: 1.0, brightness: 0,
    lightFixtureIntensity: 1.5, lightFixtureColor: '#ffffff',
};

const pane = new Pane({ title: 'MSG Jumbotron' });

const fxFolder = pane.addFolder({ title: 'Post FX', expanded: false });
fxFolder.addBinding(params, 'bloom', { min: 0, max: 3, step: 0.05, label: 'Bloom' });
fxFolder.addBinding(params, 'bloomRadius', { min: 0, max: 2, step: 0.05, label: 'Bloom Radius' });
fxFolder.addBinding(params, 'bloomThreshold', { min: 0, max: 1.5, step: 0.05, label: 'Bloom Thresh' });
fxFolder.addBlade({ view: 'separator' });
fxFolder.addBinding(params, 'grain', { min: 0, max: 0.2, step: 0.005, label: 'Film Grain' });
fxFolder.addBinding(params, 'chromatic', { min: 0, max: 0.02, step: 0.001, label: 'Chromatic Ab.' });
fxFolder.addBlade({ view: 'separator' });
fxFolder.addBinding(params, 'saturation', { min: 0, max: 2, step: 0.05, label: 'Saturation' });
fxFolder.addBinding(params, 'contrast', { min: 0.5, max: 1.5, step: 0.01, label: 'Contrast' });
fxFolder.addBinding(params, 'brightness', { min: -0.2, max: 0.2, step: 0.01, label: 'Brightness' });

const sceneFolder = pane.addFolder({ title: 'Scene', expanded: false });
sceneFolder.addBinding(params, 'ambientIntensity', { min: 0, max: 3, step: 0.05, label: 'Ambient' });
sceneFolder.addBinding(params, 'ambientColor', { label: 'Ambient Color' });
sceneFolder.addBinding(params, 'spotIntensity', { min: 0, max: 5, step: 0.1, label: 'Spots' });
sceneFolder.addBinding(params, 'spotColor', { label: 'Spot Color' });
sceneFolder.addBinding(params, 'bgColor', { label: 'Background' });
sceneFolder.addBinding(params, 'fogDensity', { min: 0, max: 0.05, step: 0.001, label: 'Fog Density' });
sceneFolder.addBinding(params, 'fogColor', { label: 'Fog Color' });
sceneFolder.addBinding(params, 'exposure', { min: 0.2, max: 3, step: 0.05, label: 'Exposure' });

const fixtureFolder = pane.addFolder({ title: 'Light Fixtures', expanded: false });
fixtureFolder.addBinding(params, 'lightFixtureIntensity', { min: 0, max: 5, step: 0.1, label: 'Intensity' });
fixtureFolder.addBinding(params, 'lightFixtureColor', { label: 'Color' });

// ── Source Controls ─────────────────────────────────────────────────
const sourceFolder = pane.addFolder({ title: 'Screen Source' });

sourceFolder.addButton({ title: 'Default Test Video' }).on('click', () => {
    if (defaultScreenTexture) { setScreenTexture(defaultScreenTexture); videoMode = true; }
});


// ── Animation Loop ──────────────────────────────────────────────────
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    elapsed += dt;

    // Scene
    ambientLight.intensity = params.ambientIntensity;
    ambientLight.color.set(params.ambientColor);
    arenaSpot1.intensity = params.spotIntensity;
    arenaSpot2.intensity = params.spotIntensity * 0.5;
    arenaSpot3.intensity = params.spotIntensity * 0.5;
    arenaSpot1.color.set(params.spotColor);
    arenaSpot2.color.set(params.spotColor);
    arenaSpot3.color.set(params.spotColor);
    renderer.setClearColor(params.bgColor);
    scene.fog.density = params.fogDensity;
    scene.fog.color.set(params.fogColor);
    renderer.toneMappingExposure = params.exposure;

    // Post FX
    bloomPass.strength = params.bloom;
    bloomPass.radius = params.bloomRadius;
    bloomPass.threshold = params.bloomThreshold;
    cinemaPass.uniforms.grainAmount.value = params.grain;
    cinemaPass.uniforms.chromaticAberration.value = params.chromatic;
    cinemaPass.uniforms.saturation.value = params.saturation;
    cinemaPass.uniforms.contrast.value = params.contrast;
    cinemaPass.uniforms.brightness.value = params.brightness;
    cinemaPass.uniforms.time.value = elapsed * 100;

    // Light fixtures
    lightFixtureUniforms.time.value = elapsed;
    lightFixtureUniforms.intensity.value = params.lightFixtureIntensity;
    lightFixtureUniforms.color.value.set(params.lightFixtureColor);

    controls.update();
    renderer.setRenderTarget(null);
    composer.render();
}
animate();

// ── Fullscreen ──────────────────────────────────────────────────────
renderer.domElement.addEventListener('dblclick', () => {
    if (!document.fullscreenElement) renderer.domElement.requestFullscreen();
    else document.exitFullscreen();
});

// ── Video/Image Switching ───────────────────────────────────────────
function switchToVideo(file) {
    if (videoElement) { videoElement.pause(); videoElement.src = ''; videoElement.remove(); }
    if (videoTexture) videoTexture.dispose();
    videoElement = document.createElement('video');
    videoElement.src = URL.createObjectURL(file);
    videoElement.loop = true; videoElement.muted = true; videoElement.playsInline = true;
    videoElement.play();
    videoTexture = new THREE.VideoTexture(videoElement);
    videoTexture.minFilter = THREE.LinearFilter; videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.colorSpace = THREE.SRGBColorSpace; videoTexture.flipY = false;
    setScreenTexture(videoTexture); videoMode = true;
}

function switchToImage(file) {
    if (videoElement) { videoElement.pause(); videoElement.src = ''; videoElement.remove(); videoElement = null; }
    if (videoTexture) videoTexture.dispose();
    const img = new Image();
    img.onload = () => {
        const tex = new THREE.Texture(img);
        tex.needsUpdate = true; tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
        tex.colorSpace = THREE.SRGBColorSpace; tex.flipY = false;
        videoTexture = tex; setScreenTexture(tex); videoMode = true;
    };
    img.src = URL.createObjectURL(file);
}

// ── Drag & Drop ─────────────────────────────────────────────────────
const dropOverlay = document.createElement('div');
dropOverlay.style.cssText = `position:fixed;inset:0;z-index:999;display:none;align-items:center;
    justify-content:center;background:rgba(0,107,182,0.3);border:4px dashed #F58426;pointer-events:none;`;
dropOverlay.innerHTML = '<div style="color:#fff;font:bold 28px Arial;text-shadow:0 2px 8px #000">Drop video or image</div>';
document.body.appendChild(dropOverlay);
let dragCounter = 0;
document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.style.display = 'flex'; });
document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.style.display = 'none'; } });
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
    e.preventDefault(); dragCounter = 0; dropOverlay.style.display = 'none';
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (file.type.startsWith('video/')) switchToVideo(file);
    else if (file.type.startsWith('image/')) switchToImage(file);
});
</script>
</body>
</html>
